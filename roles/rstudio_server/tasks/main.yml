---
# ============================================================
# 1. OS — Paquets de base pour la compilation R et les libs
# ============================================================
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - gdebi-core
      - libcurl4-openssl-dev
      - libssl-dev
      - libxml2-dev
      - libhdf5-dev
      - libgeos-dev
      - libfontconfig1-dev
      - libharfbuzz-dev
      - libfribidi-dev
      - jq
    state: present

- name: Install rclone (dedicated mode only)
  ansible.builtin.apt:
    name: rclone
    state: present
  when: rstudio_mode == 'dedicated'

# ============================================================
# 2. Utilisateur (mode dedicated uniquement)
# ============================================================
- name: Create dedicated user account
  ansible.builtin.user:
    name: "{{ rstudio_user }}"
    shell: /bin/bash
    create_home: yes
  when: rstudio_mode == 'dedicated'

- name: Set dedicated user password
  ansible.builtin.shell:
    cmd: echo '{{ rstudio_user }}:{{ rstudio_password }}' | chpasswd
  changed_when: true
  no_log: true
  when: rstudio_mode == 'dedicated'

# ============================================================
# 3. Block storage (mode dedicated uniquement)
# ============================================================
- name: Check if block storage is formatted
  ansible.builtin.command: blkid {{ block_storage_device }}
  register: blkid_result
  failed_when: false
  changed_when: false
  when: rstudio_mode == 'dedicated'

- name: Format block storage as ext4
  ansible.builtin.filesystem:
    fstype: ext4
    dev: "{{ block_storage_device }}"
  when:
    - rstudio_mode == 'dedicated'
    - blkid_result.rc != 0

- name: Create mount point
  ansible.builtin.file:
    path: "{{ block_storage_mount }}"
    state: directory
    owner: "{{ rstudio_user }}"
    group: "{{ rstudio_user }}"
    mode: "0755"
  when: rstudio_mode == 'dedicated'

- name: Mount block storage
  ansible.builtin.mount:
    path: "{{ block_storage_mount }}"
    src: "{{ block_storage_device }}"
    fstype: ext4
    opts: defaults,nofail
    state: mounted
  when: rstudio_mode == 'dedicated'

- name: Set ownership on data directory
  ansible.builtin.file:
    path: "{{ block_storage_mount }}"
    owner: "{{ rstudio_user }}"
    group: "{{ rstudio_user }}"
    recurse: yes
  when: rstudio_mode == 'dedicated'

- name: Create symlink to data in user home
  ansible.builtin.file:
    src: "{{ block_storage_mount }}"
    dest: "/home/{{ rstudio_user }}/data"
    state: link
    owner: "{{ rstudio_user }}"
    group: "{{ rstudio_user }}"
  when: rstudio_mode == 'dedicated'

# ============================================================
# 4. Miniforge / Conda
# ============================================================
- name: Check if Miniforge is installed
  ansible.builtin.stat:
    path: "{{ miniforge_install_dir }}/bin/mamba"
  register: miniforge_installed

- name: Download Miniforge installer
  ansible.builtin.get_url:
    url: "https://github.com/conda-forge/miniforge/releases/download/{{ miniforge_version }}/Miniforge3-{{ miniforge_version }}-Linux-x86_64.sh"
    dest: /tmp/miniforge.sh
    mode: "0755"
  when: not miniforge_installed.stat.exists

- name: Install Miniforge
  ansible.builtin.command:
    cmd: /tmp/miniforge.sh -b -p {{ miniforge_install_dir }}
  when: not miniforge_installed.stat.exists

- name: Create conda environment with R packages
  ansible.builtin.command:
    cmd: >
      {{ miniforge_install_dir }}/bin/mamba create -y
      -n {{ conda_env_name }}
      -c conda-forge -c bioconda
      {{ r_packages | join(' ') }}
    creates: "{{ miniforge_install_dir }}/envs/{{ conda_env_name }}"

# ============================================================
# 5. RStudio Server
# ============================================================
- name: Check if RStudio Server is installed
  ansible.builtin.command: rstudio-server version
  register: rstudio_check
  failed_when: false
  changed_when: false

- name: Download RStudio Server deb
  ansible.builtin.get_url:
    url: "https://download2.rstudio.org/server/jammy/amd64/rstudio-server-{{ rstudio_version }}-amd64.deb"
    dest: /tmp/rstudio-server.deb
  when: rstudio_check.rc != 0

- name: Install RStudio Server
  ansible.builtin.command:
    cmd: gdebi -n /tmp/rstudio-server.deb
  when: rstudio_check.rc != 0
  notify: restart rstudio-server

- name: Deploy rserver.conf
  ansible.builtin.template:
    src: rserver.conf.j2
    dest: /etc/rstudio/rserver.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart rstudio-server

# ============================================================
# 6. Rclone — Configuration S3 OVH (mode dedicated uniquement)
# ============================================================
- name: Create rclone config directory
  ansible.builtin.file:
    path: "/home/{{ rstudio_user }}/.config/rclone"
    state: directory
    owner: "{{ rstudio_user }}"
    group: "{{ rstudio_user }}"
    mode: "0700"
  when: rstudio_mode == 'dedicated' and rstudio_enable_rclone

- name: Deploy rclone config
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: "/home/{{ rstudio_user }}/.config/rclone/rclone.conf"
    owner: "{{ rstudio_user }}"
    group: "{{ rstudio_user }}"
    mode: "0600"
  when: rstudio_mode == 'dedicated' and rstudio_enable_rclone

# ============================================================
# 7. Sync S3 au shutdown (mode dedicated uniquement)
# ============================================================
- name: Deploy S3 sync script
  ansible.builtin.copy:
    dest: /usr/local/bin/sync-data-s3.sh
    mode: "0755"
    content: |
      #!/bin/bash
      rclone sync {{ block_storage_mount }} {{ rclone_remote_name }}:{{ rclone_bucket }} \
        --log-file=/var/log/rclone-sync.log \
        --log-level INFO
  when: rstudio_mode == 'dedicated' and rstudio_enable_rclone

- name: Deploy systemd sync-on-shutdown service
  ansible.builtin.copy:
    dest: /etc/systemd/system/sync-data-s3.service
    content: |
      [Unit]
      Description=Sync data to S3 before shutdown
      DefaultDependencies=no
      Before=shutdown.target reboot.target halt.target

      [Service]
      Type=oneshot
      ExecStart=/bin/true
      ExecStop=/usr/local/bin/sync-data-s3.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
  when: rstudio_mode == 'dedicated' and rstudio_enable_rclone
  notify: reload systemd

- name: Enable sync-on-shutdown service
  ansible.builtin.systemd:
    name: sync-data-s3
    enabled: yes
    state: started
  when: rstudio_mode == 'dedicated' and rstudio_enable_rclone

# ============================================================
# 8. Ensure RStudio Server is running
# ============================================================
- name: Ensure rstudio-server is started
  ansible.builtin.shell: |
    systemctl reset-failed rstudio-server || true
    systemctl restart rstudio-server
  changed_when: true
